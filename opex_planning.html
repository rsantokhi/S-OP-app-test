<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --primary: #003d7a; --light: #e8f4fd; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; }
  .input-cell {
    width: 82px; text-align: right; border: none; background: transparent;
    padding: 2px 4px; font-size: 0.78rem; color: inherit; font-family: inherit;
  }
  .input-cell:focus { outline: 2px solid #2563eb; background: #eff6ff; border-radius: 3px; }
  .input-cell::-webkit-inner-spin-button,
  .input-cell::-webkit-outer-spin-button { -webkit-appearance: none; }
  .input-cell[type=number] { -moz-appearance: textfield; }
  .cat-header td { background: #003d7a; color: white; font-weight: 600; font-size: 0.8rem; }
  .cat-total td { background: #bfdbfe; font-weight: 600; font-size: 0.78rem; color: #1e3a5f; }
  .grand-total td { background: #1e3a5f; color: white; font-weight: 700; font-size: 0.82rem; }
  .data-row:hover td { background: #f0f9ff !important; }
  .negative { color: #dc2626 !important; }
  .section-divider td { background: #f8fafc; height: 6px; padding: 0; }
  td, th { white-space: nowrap; }
  .desc-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  .scrollable { overflow-x: auto; }
  .sidebar-btn { transition: all 0.15s; }
  .sidebar-btn.active { background: #003d7a; color: white; }
  .sidebar-btn:not(.active):hover { background: #dbeafe; }
  .tab-btn { border-bottom: 3px solid transparent; transition: all 0.15s; }
  .tab-btn.active { border-bottom-color: #003d7a; color: #003d7a; font-weight: 600; }
  @media print { .no-print { display: none !important; } }
</style>
</head>
<body>

</div>

// ============================================================
// HELPERS
// ============================================================
function fmt(n) {
  if (n === 0 || n === null || n === undefined) return '–';
  return new Intl.NumberFormat('nl-NL', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
}

function fmtSign(n) {
  if (n === 0 || n === null || n === undefined) return '–';
  return new Intl.NumberFormat('nl-NL', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
}

function rowTotal(values) {
  return values.reduce((a, b) => a + (parseFloat(b) || 0), 0);
}

function activCC() {
  return STATE.costCenters.find(c => c.id === STATE.activeCCId);
}

    btn.innerHTML = `<div class="font-medium">${cc.name}</div><div class="text-xs opacity-70">${cc.company} · ${cc.currency}</div>`;
    btn.onclick = () => { STATE.activeCCId = cc.id; render(); };
    list.appendChild(btn);
  });
}

// ============================================================

function renderTable() {
  const cc = activCC();
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  let grandTotal = new Array(12).fill(0);
  let rowIdx = 0;

  cc.categories.forEach((cat, catI) => {
    // Category header row
    const catHdr = document.createElement('tr');
    catHdr.className = 'cat-header';
    catHdr.innerHTML = `
      <td colspan="3" class="px-3 py-1.5">
        <span class="mr-2 cursor-pointer" onclick="toggleCat('${cat.id}')">▾</span>
        <span contenteditable="true" onblur="renameCat('${cat.id}', this.textContent)">${cat.name}</span>
      </td>
      ${MONTHS.map((m,i) => `<td class="px-2 py-1.5 text-right cat-sum-${cat.id}-${i}">–</td>`).join('')}
      <td class="px-2 py-1.5 text-right cat-sum-${cat.id}-fy">–</td>
      <td></td>
      <td class="no-print px-1 py-1 text-center">
        <button onclick="deleteCat('${cat.id}')" class="text-red-300 hover:text-red-100 text-xs" title="Categorie verwijderen">✕</button>
      </td>
    `;
    tbody.appendChild(catHdr);

    // Data rows
    const catGroup = document.createElement('tbody');
    catGroup.id = `catGroup-${cat.id}`;

    cat.rows.forEach((row, rowI) => {
      rowIdx++;
      const tr = document.createElement('tr');
      tr.className = 'data-row border-b border-gray-100';
      tr.id = `row-${row.id}`;

      const monthCells = MONTHS.map((m, mi) => {
        const v = parseFloat(row.values[mi]) || 0;
        return `<td class="px-1 py-1 text-right">
          <input type="number" class="input-cell" value="${v || ''}" placeholder="0"
            oninput="updateCell('${cat.id}','${row.id}',${mi},this.value)"
            onkeydown="navCell(event,${rowIdx},${mi})">
        </td>`;
      }).join('');

      const total = rowTotal(row.values);
      tr.innerHTML = `
        <td class="px-3 py-1 text-gray-400 text-right" style="font-size:0.7rem">${rowIdx}</td>
        <td class="px-2 py-1">
          <input class="w-full text-xs border-0 bg-transparent text-gray-600 outline-none"
            value="${row.account}" placeholder="GL account"
            onchange="updateMeta('${cat.id}','${row.id}','account',this.value)">
        </td>
        <td class="px-2 py-1 desc-cell">
          <input class="w-full text-xs border-0 bg-transparent outline-none"
            value="${row.desc}" placeholder="Omschrijving"
            onchange="updateMeta('${cat.id}','${row.id}','desc',this.value)">
        </td>
        ${monthCells}
        <td class="px-2 py-1 text-right font-semibold row-total-${row.id} ${total < 0 ? 'negative' : ''}" style="color:${total < 0 ? '' : '#1e3a5f'}">${fmt(total)}</td>
        <td class="px-2 py-1">
          <input class="w-full text-xs border-0 bg-transparent text-gray-400 outline-none"
            value="${row.comment}" placeholder="Toelichting"
            onchange="updateMeta('${cat.id}','${row.id}','comment',this.value)">
        </td>
        <td class="no-print px-1 py-1 text-center">
          <button onclick="deleteRow('${cat.id}','${row.id}')" class="text-gray-300 hover:text-red-400 text-xs" title="Rij verwijderen">✕</button>
        </td>
      `;
      catGroup.appendChild(tr);
    });

    // Add row button
    const addRowTr = document.createElement('tr');
    addRowTr.className = 'no-print';
    addRowTr.innerHTML = `
      <td colspan="17" class="px-3 py-1">
        <button onclick="addRow('${cat.id}')" class="text-blue-500 hover:text-blue-700 text-xs">+ Rij toevoegen</button>
      </td>
    `;
    catGroup.appendChild(addRowTr);

    tbody.appendChild(catGroup);

    // Subtotal row
    const subTr = document.createElement('tr');
    subTr.className = 'cat-total';
    subTr.id = `catTotal-${cat.id}`;
    let catTotals = new Array(12).fill(0);
    cat.rows.forEach(r => r.values.forEach((v, i) => { catTotals[i] += parseFloat(v) || 0; }));
    let catFY = catTotals.reduce((a,b) => a+b, 0);
    for (let i=0;i<12;i++) grandTotal[i] += catTotals[i];

    subTr.innerHTML = `
      <td colspan="3" class="px-3 py-1.5 text-gray-600">Subtotaal: ${cat.name}</td>
      ${catTotals.map((v,i) => `<td class="px-2 py-1.5 text-right cat-sum-${cat.id}-${i} ${v < 0 ? 'negative' : ''}">${fmt(v)}</td>`).join('')}
      <td class="px-2 py-1.5 text-right cat-sum-${cat.id}-fy ${catFY < 0 ? 'negative' : ''}">${fmt(catFY)}</td>
      <td></td><td class="no-print"></td>
    `;
    tbody.appendChild(subTr);

    // Divider
    const divTr = document.createElement('tr');
    divTr.className = 'section-divider';
    divTr.innerHTML = '<td colspan="17"></td>';
    tbody.appendChild(divTr);
  });

  // Grand total row
  const grandFY = grandTotal.reduce((a,b) => a+b, 0);
  const gtTr = document.createElement('tr');
  gtTr.className = 'grand-total';
  gtTr.id = 'grandTotalRow';
  gtTr.innerHTML = `
    <td colspan="3" class="px-3 py-2">TOTAAL OPEX – ${activCC().name} (${activCC().currency})</td>
    ${grandTotal.map((v,i) => `<td class="px-2 py-2 text-right grand-col-${i} ${v < 0 ? 'text-red-300' : ''}">${fmt(v)}</td>`).join('')}
    <td class="px-2 py-2 text-right ${grandFY < 0 ? 'text-red-300' : ''}" id="grandFY">${fmt(grandFY)}</td>
    <td></td><td class="no-print"></td>
  `;
  tbody.appendChild(gtTr);

  // Update header total
  const htEl = document.getElementById('headerTotal');
  if (htEl) htEl.textContent = `${activCC().currency} ${fmt(grandFY)}`;
}

// ============================================================
// CELL UPDATE
// ============================================================
function updateCell(catId, rowId, monthIdx, value) {
  const cc = activCC();
  const cat = cc.categories.find(c => c.id === catId);
  const row = cat.rows.find(r => r.id === rowId);
  row.values[monthIdx] = parseFloat(value) || 0;
  recalcTotals(catId);
}

function updateMeta(catId, rowId, field, value) {
  const cc = activCC();
  const cat = cc.categories.find(c => c.id === catId);
  const row = cat.rows.find(r => r.id === rowId);
  row[field] = value;
}

function renameCat(catId, name) {
  const cc = activCC();
  const cat = cc.categories.find(c => c.id === catId);
  cat.name = name.trim();
}

// ============================================================
// RECALC (fast – no full re-render)
// ============================================================
function recalcTotals(catId) {
  const cc = activCC();
  const cat = cc.categories.find(c => c.id === catId);

  // Row totals
  cat.rows.forEach(row => {
    const total = rowTotal(row.values);
    const el = document.querySelector(`.row-total-${row.id}`);
    if (el) {
      el.textContent = fmt(total);
      el.classList.toggle('negative', total < 0);
      el.style.color = total < 0 ? '' : '#1e3a5f';
    }
  });

  // Category subtotals
  let catTotals = new Array(12).fill(0);
  cat.rows.forEach(r => r.values.forEach((v,i) => { catTotals[i] += parseFloat(v) || 0; }));
  let catFY = catTotals.reduce((a,b) => a+b, 0);
  for (let i=0;i<12;i++) {
    const el = document.querySelector(`.cat-sum-${catId}-${i}`);
    if (el) { el.textContent = fmt(catTotals[i]); el.classList.toggle('negative', catTotals[i] < 0); }
  }
  const fyEl = document.querySelector(`.cat-sum-${catId}-fy`);
  if (fyEl) { fyEl.textContent = fmt(catFY); fyEl.classList.toggle('negative', catFY < 0); }

  // Grand totals
  let grandTotal = new Array(12).fill(0);
  cc.categories.forEach(c => c.rows.forEach(r => r.values.forEach((v,i) => { grandTotal[i] += parseFloat(v) || 0; })));
  let grandFY = grandTotal.reduce((a,b) => a+b, 0);
  for (let i=0;i<12;i++) {
    const el = document.querySelector(`.grand-col-${i}`);
    if (el) { el.textContent = fmt(grandTotal[i]); el.classList.toggle('text-red-300', grandTotal[i] < 0); }
  }
  const gFYEl = document.getElementById('grandFY');
  if (gFYEl) { gFYEl.textContent = fmt(grandFY); gFYEl.classList.toggle('text-red-300', grandFY < 0); }

  // Header total
  const htEl = document.getElementById('headerTotal');
  if (htEl) htEl.textContent = `${cc.currency} ${fmt(grandFY)}`;

  // Update charts if visible
  if (STATE.activeTab === 'chart') renderCharts();
}

// ============================================================
// ADD / DELETE
// ============================================================
function addRow(catId) {
  const cc = activCC();
  const cat = cc.categories.find(c => c.id === catId);
  cat.rows.push({ id: 'r' + (++nextRowId), account: '', desc: '', values: new Array(12).fill(0), comment: '' });
  renderTable();
}

function deleteRow(catId, rowId) {
  const cc = activCC();
  const cat = cc.categories.find(c => c.id === catId);
  if (cat.rows.length <= 1) { cat.rows[0] = { id: cat.rows[0].id, account:'', desc:'', values: new Array(12).fill(0), comment:'' }; }
  else { cat.rows = cat.rows.filter(r => r.id !== rowId); }
  renderTable();
}

function addCategory() {
  const name = prompt('Naam van de nieuwe categorie:');
  if (!name) return;
  const cc = activCC();
  cc.categories.push({
    id: 'c' + (++nextCatId), name,
    rows: [{ id: 'r' + (++nextRowId), account:'', desc:'', values: new Array(12).fill(0), comment:'' }]
  });
  renderTable();
}

function deleteCat(catId) {
  if (!confirm('Categorie verwijderen?')) return;
  const cc = activCC();
  cc.categories = cc.categories.filter(c => c.id !== catId);
  renderTable();
}

function toggleCat(catId) {
  const grp = document.getElementById(`catGroup-${catId}`);
  if (grp) grp.style.display = grp.style.display === 'none' ? '' : 'none';
}

// ============================================================
// CHARTS
// ============================================================
function renderCharts() {
  const cc = activCC();

  // Compute monthly and category totals
  let monthlyTotals = new Array(12).fill(0);
  let catNames = [], catTotals = [], catColors = [];
  const colors = ['#003d7a','#0066cc','#2563eb','#60a5fa','#93c5fd','#bfdbfe','#1e3a5f','#1d4ed8','#3b82f6','#7dd3fc'];

  cc.categories.forEach((cat, i) => {
    let sum = 0;
    cat.rows.forEach(r => r.values.forEach((v, mi) => {
      const n = parseFloat(v) || 0;
      monthlyTotals[mi] += n;
      sum += n;
    }));
    catNames.push(cat.name.length > 25 ? cat.name.substring(0,25)+'…' : cat.name);
    catTotals.push(Math.abs(sum));
    catColors.push(colors[i % colors.length]);
  });

  // Bar chart – monthly
  if (barChartInst) barChartInst.destroy();
  const barCtx = document.getElementById('barChart').getContext('2d');
  barChartInst = new Chart(barCtx, {
    type: 'bar',
    data: {
      labels: MONTHS,
      datasets: [{
        label: `OPEX ${cc.currency}`,
        data: monthlyTotals,
        backgroundColor: monthlyTotals.map(v => v < 0 ? '#fca5a5' : '#003d7a'),
        borderRadius: 4
      }]
    },
    options: {
      responsive: true, plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: v => fmt(v) } } }
    }
  });

  // Pie chart – categories (absolute values)
  if (pieChartInst) pieChartInst.destroy();
  const pieCtx = document.getElementById('pieChart').getContext('2d');
  pieChartInst = new Chart(pieCtx, {
    type: 'doughnut',
    data: {
      labels: catNames,
      datasets: [{ data: catTotals, backgroundColor: catColors, borderWidth: 2 }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'right', labels: { font: { size: 10 } } },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${fmt(ctx.raw)} ${cc.currency}` } }
      }
    }
  });

  // Line chart – cumulative
  if (lineChartInst) lineChartInst.destroy();
  const lineCtx = document.getElementById('lineChart').getContext('2d');
  let cumulative = [], running = 0;
  monthlyTotals.forEach(v => { running += v; cumulative.push(running); });
  lineChartInst = new Chart(lineCtx, {
    type: 'line',
    data: {
      labels: MONTHS,
      datasets: [{
        label: `Cumulatief OPEX ${cc.currency}`,
        data: cumulative,
        borderColor: '#003d7a',
        backgroundColor: 'rgba(0,61,122,0.08)',
        fill: true,
        tension: 0.3,
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { ticks: { callback: v => fmt(v) } } }
    }
  });
}

// ============================================================
// SUMMARY VIEW
// ============================================================
function renderSummary() {
  const container = document.getElementById('summaryContent');
  let html = `<div class="overflow-x-auto">
    <table class="w-full text-sm border-collapse">
      <thead>
        <tr style="background:#003d7a;color:white">
          <th class="px-4 py-2 text-left">Cost Center</th>
          <th class="px-3 py-2 text-left">Leider</th>
          <th class="px-3 py-2 text-left">Valuta</th>
          ${MONTHS.map(m => `<th class="px-2 py-2 text-right">${m}</th>`).join('')}
          <th class="px-3 py-2 text-right font-bold">FY 2026</th>
        </tr>
      </thead>
      <tbody>`;

  STATE.costCenters.forEach((cc, idx) => {
    let monthlyTotals = new Array(12).fill(0);
    cc.categories.forEach(cat => cat.rows.forEach(r => r.values.forEach((v,i) => {
      monthlyTotals[i] += parseFloat(v) || 0;
    })));
    const fy = monthlyTotals.reduce((a,b) => a+b, 0);
    const bg = idx % 2 === 0 ? '#f8fafc' : 'white';
    html += `<tr style="background:${bg}">
      <td class="px-4 py-2 font-semibold" style="color:#003d7a">${cc.name}</td>
      <td class="px-3 py-2 text-gray-600">${cc.leader}</td>
      <td class="px-3 py-2 text-gray-500">${cc.currency}</td>
      ${monthlyTotals.map(v => `<td class="px-2 py-2 text-right text-gray-700 ${v < 0 ? 'text-red-600' : ''}">${fmt(v)}</td>`).join('')}
      <td class="px-3 py-2 text-right font-bold ${fy < 0 ? 'text-red-600' : ''}" style="color:${fy >= 0 ? '#003d7a' : ''}">${fmt(fy)}</td>
    </tr>`;

    // Per category
    cc.categories.forEach(cat => {
      let catMo = new Array(12).fill(0);
      cat.rows.forEach(r => r.values.forEach((v,i) => { catMo[i] += parseFloat(v) || 0; }));
      const catFY = catMo.reduce((a,b) => a+b, 0);
      if (catFY === 0) return;
      html += `<tr style="background:${bg}">
        <td class="px-4 py-1 pl-8 text-xs text-gray-400">↳ ${cat.name}</td>
        <td colspan="2" class="px-3 py-1"></td>
        ${catMo.map(v => `<td class="px-2 py-1 text-right text-xs text-gray-500 ${v < 0 ? 'text-red-400' : ''}">${fmt(v)}</td>`).join('')}
        <td class="px-3 py-1 text-right text-xs ${catFY < 0 ? 'text-red-500' : 'text-gray-600'}">${fmt(catFY)}</td>
      </tr>`;
    });
  });

  html += `</tbody></table></div>`;
  container.innerHTML = html;
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab, btnEl) {
  STATE.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  document.getElementById('tab-opex').classList.toggle('hidden', tab !== 'opex');
  document.getElementById('tab-chart').classList.toggle('hidden', tab !== 'chart');
  document.getElementById('tab-summary').classList.toggle('hidden', tab !== 'summary');

  if (tab === 'chart') renderCharts();
  if (tab === 'summary') renderSummary();
}

function showSummary() {
  document.getElementById('summaryTabBtn').click();
  switchTab('summary', document.getElementById('summaryTabBtn'));
}

// KEYBOARD NAV (arrow keys in table)
// ============================================================
function navCell(e, rowIdx, colIdx) {
  if (!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.key)) return;
  // Simple tab/enter navigation
}

// ============================================================
// EXPORT CSV
// ============================================================
function exportCSV() {
  const cc = activCC();
  let rows = [['Account','Omschrijving',...MONTHS,'FY 2026','Toelichting']];
  cc.categories.forEach(cat => {
    rows.push([`=== ${cat.name} ===`]);
    cat.rows.forEach(row => {
      if (!row.desc && row.values.every(v => !v)) return;
      rows.push([row.account, row.desc, ...row.values, rowTotal(row.values), row.comment]);
    });
    let catTotals = new Array(12).fill(0);
    cat.rows.forEach(r => r.values.forEach((v,i) => { catTotals[i] += parseFloat(v)||0; }));
    rows.push(['','SUBTOTAAL',...catTotals, catTotals.reduce((a,b)=>a+b,0),'']);
    rows.push([]);
  });
  let csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `OPEX_${cc.id}_2026.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  renderSidebar();
  renderInfoBar();
  renderTable();
  if (STATE.activeTab === 'chart') renderCharts();
  if (STATE.activeTab === 'summary') renderSummary();
}

// Init
render();
</script>
